name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
  IMAGE_TAG: latest
  WEBSITE_URL: http://ALB-web-212639990.ap-southeast-1.elb.amazonaws.com

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # ===== TELEGRAM START =====
      - name: Notify Deploy Started
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 DEPLOY STARTED%0AWorkflow Run: #${{ github.run_number }}%0ARepository: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.event.head_commit.message }}"

      # ===== CHECKOUT =====
      - name: Checkout source code
        uses: actions/checkout@v4

      # ===== SETUP NODE =====
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ===== INSTALL HTML VALIDATOR =====
      - name: Install HTML Validator
        run: |
          npm install -g htmlhint

      # ===== HTML CHECK =====
      - name: Validate HTML
        run: |
          htmlhint index.html

      # ===== JS CHECK =====
      - name: Validate JavaScript
        run: |
          node --check script.js

      # ===== AWS LOGIN =====
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ===== LOGIN ECR =====
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ===== BUILD IMAGE =====
      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      # ===== TAG IMAGE =====
      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      # ===== PUSH IMAGE =====
      - name: Push Docker Image to ECR
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      # ===== DEPLOY ECS =====
      - name: Deploy to ECS Service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment

      # ===== WAIT ECS =====
      - name: Wait for ECS Stable
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE

      # ===== WEBSITE HEALTH CHECK =====
      - name: Check Website Health
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $WEBSITE_URL)

          echo "Website status code: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Website health check failed"
            exit 1
          fi

      # ===== TELEGRAM SUCCESS =====
      - name: Telegram Success Notification
        if: success()
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=✅ DEPLOY SUCCESS%0AWorkflow Run: #${{ github.run_number }}%0ACommit: ${{ github.event.head_commit.message }}%0ASHA: ${{ github.sha }}%0AService: ${{ env.ECS_SERVICE }}%0AWebsite OK (200)"

      # ===== TELEGRAM FAILED =====
      - name: Telegram Failed Notification
        if: failure()
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=❌ DEPLOY FAILED%0AWorkflow Run: #${{ github.run_number }}%0ACommit: ${{ github.event.head_commit.message }}%0ABranch: ${{ github.ref_name }}%0AStopped before deployment completed"
