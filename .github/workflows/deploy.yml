name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
  IMAGE_TAG: latest
  WEBSITE_URL: http://ALB-web-212639990.ap-southeast-1.elb.amazonaws.com

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # ===== TELEGRAM START =====
      - name: Notify Deploy Started
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="🚀 Deploy started

          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Actor: ${{ github.actor }}"

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Docker Image to ECR
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to ECS Service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment

      - name: Wait for ECS Stable
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE

      # ===== WEBSITE HEALTH CHECK =====
      - name: Check Website Health
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $WEBSITE_URL)

          echo "Website status code: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Website health check failed"
            exit 1
          fi

      - name: Deploy Success
        run: echo "Deployment completed successfully"

      # ===== TELEGRAM SUCCESS =====
      - name: Telegram Success Notification
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ Deploy SUCCESS

          Repository: ${{ github.repository }}
          Commit: ${{ github.sha }}

          ECS Service: ${{ env.ECS_SERVICE }}
          Website: ${{ env.WEBSITE_URL }}
          Status: Healthy (200 OK)"

      # ===== TELEGRAM FAIL =====
      - name: Telegram Failed Notification
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ Deploy FAILED

          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}

          Check GitHub Actions logs."
